<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">HACK-</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            color: #00ff00;
            background: #000;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding-top: 15vh;
        }
        h1 {
            font-size: 3.8rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff00;
        }
        .random-number {
            font-size: 4.5rem;
            font-weight: bold;
            color: #00ff41;
            text-shadow: 0 0 30px #00ff00;
        }
        p {
            font-size: 1.4rem;
            max-width: 700px;
            margin: 20px auto;
            opacity: 0.9;
        }
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent, rgba(0, 255, 0, 0.03));
            pointer-events: none;
            z-index: 3;
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="content">
        <h1>HACK-<span id="random-num" class="random-number">00000</span></h1>
        <p>ACCESS GRANTED • SYSTEM BREACHED • DATA STREAM ACTIVE</p>
        <p>Refresh the page to generate new access code</p>
    </div>

    <div class="scanline"></div>

    <script>
        // === Matrix Digital Rain ===
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const chars = "01アイウエオカキクケコサシスセソタチツテト0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * canvas.height / fontSize;
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#00ff00';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 35);

        // Resize canvas when window resizes
        window.addEventListener('resize', () => {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        });

        // === Random Number ===
        function getRandomNumber() {
            return Math.floor(Math.random() * 90000) + 10000;
        }

        function updateRandomName() {
            const randomNum = getRandomNumber();
            document.getElementById('random-num').textContent = randomNum;
            document.getElementById('page-title').textContent = `HACK-${randomNum}`;
        }

        window.onload = updateRandomName;
    </script>
</body>
</html>
